<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaf Health Checker 🌿</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
      }

      body {
        background: linear-gradient(135deg, #e8f5e9, #ffffff);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      #root {
        width: 100%;
        max-width: 500px;
        padding: 20px;
        border-radius: 16px;
        background: white;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      }

      h1 {
        text-align: center;
        color: #2e7d32;
        margin-bottom: 10px;
      }

      p {
        text-align: center;
        color: #555;
        font-size: 14px;
        margin-bottom: 20px;
      }

      .footer {
        text-align: center;
        margin-top: 20px;
        font-size: 12px;
        color: #888;
      }
    </style>
  </head>

  <body>
    <div id="root">
      <h1>🌿 Leaf Health Checker</h1>
      <p>Upload a plant image to detect disease & health status</p>
    </div>

    <div class="footer">
      Made with ❤️ for Plant Care
    </div>
  </body>
</html>
